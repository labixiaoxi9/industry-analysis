<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>行业研究智能体</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --panel: #ffffff;
      --primary: #1f4fbf;
      --primary-dark: #183d95;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .chat-shell {
      width: min(980px, 100%);
      height: min(86vh, 900px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-rows: 64px 1fr auto;
      overflow: hidden;
    }

    .chat-header {
      background: linear-gradient(90deg, #103a9b, #1f4fbf);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      font-weight: 700;
    }

    .chat-sub {
      font-size: 12px;
      opacity: 0.9;
      font-weight: 400;
    }

    .chat-body {
      padding: 18px;
      overflow-y: auto;
      background: #f9fbff;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      width: 100%;
      max-width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: normal;
      overflow-wrap: anywhere;
      writing-mode: horizontal-tb;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 14px;
    }

    .msg.user {
      align-self: flex-end;
      background: #e9f0ff;
      border-color: #cddcff;
      width: fit-content;
      max-width: 84%;
    }

    .msg.assistant {
      align-self: flex-start;
      max-width: 100%;
    }

    .msg a {
      color: #1f4fbf;
      text-decoration: underline;
      font-weight: 600;
    }

    .download-box {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .download-btn {
      display: inline-block;
      height: 32px;
      line-height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      background: #0f7b0f;
      color: #fff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }

    .download-status {
      font-size: 12px;
      color: var(--muted);
    }

    .composer {
      border-top: 1px solid var(--border);
      background: #fff;
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 48px;
      max-height: 180px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
    }

    button {
      height: 44px;
      min-width: 96px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      padding: 0 16px;
    }

    button:hover { background: var(--primary-dark); }
    button:disabled { opacity: 0.65; cursor: not-allowed; }

    .tip {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="chat-shell">
    <div class="chat-header">
      <div>行业研究智能体</div>
      <div class="chat-sub">聚焦：行业调查 / 龙头企业分析 / 未来展望</div>
    </div>

    <div id="chatBody" class="chat-body"></div>

    <div>
      <div class="composer">
        <textarea id="input" placeholder="请输入你想分析的行业问题，例如：请对低空经济做行业调查，并给出龙头企业和未来3年展望。"></textarea>
        <button id="sendBtn">发送</button>
      </div>
      <div class="tip" style="padding:0 14px 12px;">提示：按 Enter 发送，Shift + Enter 换行。</div>
    </div>
  </div>

  <script>
    const chatBody = document.getElementById('chatBody');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    const history = [
      {
        role: 'system',
        content: '你是行业研究智能体。请围绕用户问题输出结构化分析，优先覆盖：1) 行业调查 2) 龙头企业分析 3) 未来展望。回答务实、清晰、可执行。'
      }
    ];

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeBrokenUrls(rawText) {
      let t = rawText || '';
      t = t.replace(/\[([^\]]+)\]\(([\s\S]*?)\)/g, (_, label, url) => {
        const compact = url.replace(/\s+/g, '');
        if (/^https?:\/\//i.test(compact)) return `[${label}](${compact})`;
        return `[${label}](${url})`;
      });
      return t;
    }

    function formatMessageToHtml(text) {
      const normalized = normalizeBrokenUrls(text || '');
      const safe = escapeHtml(normalized);
      const lines = safe.split(/\r?\n/);
      const htmlParts = [];
      let inList = false;

      const inlineFormat = (s) => {
        let t = s;
        t = t.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => {
          const cleanUrl = url.replace(/[),.;!?]+$/g, '');
          return `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer">${label}</a>`;
        });
        t = t.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        t = t.replace(/(^|\s)(https?:\/\/[^\s<]+)/g, (m, p1, url) => {
          const cleanUrl = url.replace(/[),.;!?]+$/g, '');
          return `${p1}<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer">${cleanUrl}</a>`;
        });
        return t;
      };

      for (const rawLine of lines) {
        const line = rawLine.trim();

        if (!line) {
          if (inList) {
            htmlParts.push('</ul>');
            inList = false;
          }
          htmlParts.push('<br/>');
          continue;
        }

        const h3 = line.match(/^###\s+(.*)$/);
        const h2 = line.match(/^##\s+(.*)$/);
        const h1 = line.match(/^#\s+(.*)$/);
        const bullet = line.match(/^-\s+(.*)$/);

        if (h3) {
          if (inList) { htmlParts.push('</ul>'); inList = false; }
          htmlParts.push(`<h3 style="margin:10px 0 6px;font-size:16px;">${inlineFormat(h3[1])}</h3>`);
          continue;
        }
        if (h2) {
          if (inList) { htmlParts.push('</ul>'); inList = false; }
          htmlParts.push(`<h2 style="margin:12px 0 8px;font-size:18px;">${inlineFormat(h2[1])}</h2>`);
          continue;
        }
        if (h1) {
          if (inList) { htmlParts.push('</ul>'); inList = false; }
          htmlParts.push(`<h1 style="margin:14px 0 10px;font-size:20px;">${inlineFormat(h1[1])}</h1>`);
          continue;
        }
        if (bullet) {
          if (!inList) {
            htmlParts.push('<ul style="margin:6px 0 10px 20px; padding:0;">');
            inList = true;
          }
          htmlParts.push(`<li style="margin:4px 0;">${inlineFormat(bullet[1])}</li>`);
          continue;
        }

        if (inList) {
          htmlParts.push('</ul>');
          inList = false;
        }
        htmlParts.push(`<p style="margin:6px 0;">${inlineFormat(line)}</p>`);
      }

      if (inList) htmlParts.push('</ul>');
      return htmlParts.join('');
    }

    function appendDownloadBox(parentEl, downloadUrl) {
      const box = document.createElement('div');
      box.className = 'download-box';

      if (downloadUrl) {
        box.innerHTML = `
          <a class="download-btn" href="${downloadUrl}" target="_blank" rel="noopener noreferrer">下载 PDF 报告</a>
          <span class="download-status">链接由本服务生成，可直接下载</span>
        `;
      } else {
        box.innerHTML = `
          <button class="download-btn" type="button" style="background:#6b7280;cursor:not-allowed;" disabled>下载 PDF 报告</button>
          <span class="download-status">本次未生成 PDF（请先安装 reportlab 并重启服务）</span>
        `;
      }

      parentEl.appendChild(box);
    }

    function addMessage(role, content) {
      const el = document.createElement('div');
      el.className = `msg ${role}`;
      if (role === 'assistant') {
        el.innerHTML = formatMessageToHtml(content);
      } else {
        el.textContent = content;
      }
      chatBody.appendChild(el);
      chatBody.scrollTop = chatBody.scrollHeight;
      return el;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      addMessage('user', text);
      inputEl.value = '';
      sendBtn.disabled = true;

      history.push({ role: 'user', content: text });
      const loadingNode = addMessage('assistant', '正在搜索全网权威数据，生成行业分析报告，请耐心等待');

      try {
        const resp = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: history })
        });

        if (!resp.ok) {
          const errText = await resp.text();
          throw new Error(`${resp.status} ${errText}`);
        }

        const data = await resp.json();
        const answer = data.answer || '接口返回成功，但未拿到回答内容。';

        loadingNode.innerHTML = formatMessageToHtml(answer);
        appendDownloadBox(loadingNode, data.download_url);

        history.push({ role: 'assistant', content: answer });
      } catch (err) {
        loadingNode.textContent = `请求失败：${err.message}`;
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    addMessage('assistant', '你好，我是行业研究智能体。请告诉我你要分析的行业或赛道。');
  </script>
</body>
</html>
